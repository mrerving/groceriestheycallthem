<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6b7fa3">
  <title>Pantry</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- ===== Install banner ===== -->
  <div id="install-banner" class="hidden">
    <div class="install-banner-text">
      <strong>Add Pantry to your home screen</strong>
      Works offline and loads faster
    </div>
    <button id="btn-install" class="btn btn-secondary" style="width:auto;padding:8px 14px;font-size:0.85rem">Install</button>
    <button id="btn-install-dismiss" class="btn-ghost" style="padding:8px;font-size:0.85rem">✕</button>
  </div>

  <!-- ===== Main content ===== -->
  <div id="content">

    <!-- ── Inventory tab ── -->
    <section class="tab-panel" id="tab-inventory">
      <div class="page-header" style="position:relative">
        <h2>Inventory</h2>
        <div class="header-actions">
          <button id="btn-settings" class="icon-btn">⚙</button>
        </div>
        <div id="settings-menu" class="settings-menu" style="display:none">
          <button id="btn-export">📤 Export JSON</button>
          <button id="btn-import-trigger">📥 Import JSON</button>
        </div>
      </div>
      <div class="filter-bar" id="inventory-filter-bar">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="expiring">Expiring soon</button>
        <button class="filter-chip" data-filter="category">By category</button>
      </div>
      <div id="inventory-list"></div>
      <input type="file" id="import-file-input" accept=".json" style="display:none">
    </section>

    <!-- ── Diners tab ── -->
    <section class="tab-panel" id="tab-diners">
      <div class="page-header">
        <h2>Diners</h2>
        <button id="btn-add-profile" class="btn btn-secondary" style="font-size:0.85rem;padding:8px 12px;width:auto">+ Occasion</button>
      </div>
      <div id="diners-list"></div>
    </section>

    <!-- ── Plan tab ── -->
    <section class="tab-panel" id="tab-plan">
      <div class="page-header">
        <h2>Meal Plan</h2>
      </div>

      <div class="plan-section">
        <h3>Occasion</h3>
        <select id="plan-profile-select" style="width:100%;padding:10px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:1rem;color:var(--text);appearance:none;-webkit-appearance:none"></select>
      </div>

      <div class="plan-section">
        <h3>Item filter</h3>
        <div class="filter-bar" id="plan-filter-bar">
          <button class="filter-chip active" data-plan-filter="all">All</button>
          <button class="filter-chip" data-plan-filter="expiring">Expiring soon</button>
          <button class="filter-chip" data-plan-filter="days">Within N days</button>
        </div>
        <div class="days-filter-row" id="days-filter-row" style="display:none">
          Within <input type="number" id="plan-days-input" value="7" min="1" max="365"> days
        </div>
      </div>

      <div id="plan-preview" class="plan-preview"></div>

      <div class="btn-plan-row">
        <button id="btn-copy-prompt" class="btn btn-secondary">Copy prompt</button>
        <button id="btn-open-claude" class="btn btn-primary">Open in Claude</button>
      </div>

      <div class="char-count" id="char-count"></div>
      <div class="plan-warning" id="plan-warning"></div>
    </section>

  </div><!-- #content -->

  <!-- ===== Bottom tab bar ===== -->
  <nav id="tab-bar">
    <button class="tab-btn" data-tab="inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Inventory
    </button>
    <button class="tab-btn" data-tab="diners">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Diners
    </button>
    <button class="tab-btn" data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      Plan
    </button>
  </nav>

  <!-- ===== FAB ===== -->
  <button id="fab-add" style="display:flex">+</button>

  <!-- ===== Toast container ===== -->
  <div id="toast-container"></div>

  <!-- ===== Item sheet dialog ===== -->
  <dialog id="item-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="item-sheet-title">Add item</h3>
      <button class="btn-ghost" id="item-cancel-btn" style="padding:8px">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label for="item-name">Name</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="item-name" placeholder="e.g. Canned tomatoes" autocomplete="off">
          <button id="btn-scan" class="btn btn-secondary" style="width:auto;padding:10px 12px;white-space:nowrap;flex-shrink:0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M21 16h-3v3"/><path d="M18 21h3"/><path d="M21 11v-1"/><path d="M11 3v1"/><path d="M11 8v3h3"/><path d="M11 21v-3"/><path d="M16 11h1"/></svg>
            Scan
          </button>
        </div>
        <p id="barcode-unsupported" class="attribution-note" style="display:none;margin-top:4px">Barcode scanning not supported in this browser.</p>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="item-location">Location</label>
          <select id="item-location">
            <option value="pantry">Pantry</option>
            <option value="fridge">Fridge</option>
            <option value="freezer">Freezer</option>
          </select>
        </div>
        <div class="field">
          <label for="item-category">Category</label>
          <select id="item-category">
            <option value="produce">Produce</option>
            <option value="dairy">Dairy</option>
            <option value="meat">Meat</option>
            <option value="grains">Grains</option>
            <option value="canned">Canned</option>
            <option value="condiments">Condiments</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="item-quantity">Quantity</label>
          <input type="text" id="item-quantity" placeholder="e.g. 2">
        </div>
        <div class="field">
          <label for="item-unit">Unit</label>
          <input type="text" id="item-unit" placeholder="e.g. cans">
        </div>
      </div>

      <div class="field">
        <label for="item-expiry">Expiry date</label>
        <input type="date" id="item-expiry">
      </div>

      <div class="field">
        <label for="item-notes">Notes</label>
        <textarea id="item-notes" placeholder="Optional notes..."></textarea>
      </div>

      <p id="scan-attribution" class="attribution-note" style="display:none">
        Product data from <a href="https://world.openfoodfacts.org" target="_blank" rel="noopener">Open Food Facts</a>, licensed under <a href="https://opendatacommons.org/licenses/odbl/1.0/" target="_blank" rel="noopener">ODbL</a>.
      </p>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
        <button id="item-save-btn" class="btn btn-primary">Save item</button>
        <button id="item-delete-btn" class="btn btn-danger" style="display:none">Delete item</button>
      </div>
    </div>
  </dialog>

  <!-- ===== Profile sheet dialog ===== -->
  <dialog id="profile-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="profile-sheet-title">Add occasion</h3>
      <button class="btn-ghost" id="profile-cancel-btn" style="padding:8px">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label for="profile-name">Occasion name</label>
        <input type="text" id="profile-name" placeholder="e.g. Friday dinner, Holiday party">
      </div>
      <div class="field">
        <label for="profile-tags">Tags <span style="font-weight:400;text-transform:none">(comma-separated)</span></label>
        <input type="text" id="profile-tags" placeholder="e.g. weeknight, vegetarian, family">
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
        <button id="profile-save-btn" class="btn btn-primary">Save occasion</button>
        <button id="profile-delete-btn" class="btn btn-danger" style="display:none">Delete occasion</button>
      </div>
    </div>
  </dialog>

  <!-- ===== Diner sheet dialog ===== -->
  <dialog id="diner-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="diner-sheet-title">Add diner</h3>
      <button class="btn-ghost" id="diner-cancel-btn" style="padding:8px">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label for="diner-name">Name</label>
        <input type="text" id="diner-name" placeholder="e.g. Sam">
      </div>

      <div class="field">
        <label for="diner-link-input">Paste questionnaire link</label>
        <input type="url" id="diner-link-input" placeholder="Paste a response link to auto-fill...">
      </div>

      <div class="field">
        <label>Dietary restrictions</label>
        <div class="pill-group" id="diner-restrictions-group">
          <button class="pill-toggle" data-value="vegetarian">Vegetarian</button>
          <button class="pill-toggle" data-value="vegan">Vegan</button>
          <button class="pill-toggle" data-value="gluten-free">Gluten-free</button>
          <button class="pill-toggle" data-value="dairy-free">Dairy-free</button>
          <button class="pill-toggle" data-value="nut allergy">Nut allergy</button>
          <button class="pill-toggle" data-value="shellfish allergy">Shellfish allergy</button>
          <button class="pill-toggle" data-value="halal">Halal</button>
          <button class="pill-toggle" data-value="kosher">Kosher</button>
          <button class="pill-toggle" data-value="none">None</button>
        </div>
      </div>

      <div class="field">
        <label>Spice tolerance</label>
        <div class="spice-group" id="diner-spice-group">
          <button class="spice-btn" data-level="0">🥛<br>No spice</button>
          <button class="spice-btn" data-level="1">🌶️<br>Mild</button>
          <button class="spice-btn" data-level="2">🌶️🌶️<br>Medium</button>
          <button class="spice-btn" data-level="3">🌶️🌶️🌶️<br>Hot</button>
          <button class="spice-btn" data-level="4">🔥<br>Bring it</button>
        </div>
      </div>

      <div class="field">
        <label for="diner-loves">Foods I love</label>
        <textarea id="diner-loves" placeholder="e.g. pasta, Thai food, mushrooms..."></textarea>
      </div>

      <div class="field">
        <label for="diner-dislikes">Hard nos</label>
        <textarea id="diner-dislikes" placeholder="e.g. cilantro, blue cheese..."></textarea>
      </div>

      <div class="field">
        <label for="diner-notes">Notes</label>
        <textarea id="diner-notes" placeholder="Allergies, preferences, etc."></textarea>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
        <button id="diner-save-btn" class="btn btn-primary">Save diner</button>
        <button id="diner-delete-btn" class="btn btn-danger" style="display:none">Delete diner</button>
      </div>
    </div>
  </dialog>

  <!-- ===== Scan overlay dialog ===== -->
  <dialog id="scan-overlay">
    <video id="scan-video" autoplay playsinline muted></video>
    <div class="scan-reticle"></div>
    <p class="scan-hint">Point at a barcode</p>
    <div class="scan-spinner" id="scan-spinner"></div>
    <button id="scan-close">✕</button>
  </dialog>

  <!-- ===== Scripts ===== -->
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(console.error);
    }
  </script>
  <script src="app.js" defer></script>
</body>
</html>
